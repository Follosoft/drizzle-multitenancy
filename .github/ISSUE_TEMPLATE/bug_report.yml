name: Bug Report
description: Report a bug in @follosoft/drizzle-multitenancy
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the details below.

        Before submitting, please check existing issues to avoid duplicates.

  - type: input
    id: package-version
    attributes:
      label: Package version
      description: Run `npm list @follosoft/drizzle-multitenancy`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: drizzle-version
    attributes:
      label: Drizzle ORM version
      description: Run `npm list drizzle-orm`
      placeholder: "0.38.0"
    validations:
      required: true

  - type: dropdown
    id: database-provider
    attributes:
      label: Database provider
      options:
        - Neon (built-in)
        - Custom provider
        - Not applicable
    validations:
      required: true

  - type: dropdown
    id: database-strategy
    attributes:
      label: Database strategy
      options:
        - separate-db
        - shared-db
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Configure tenancy with...
        2. Send a request with...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages and stack traces if applicable.
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime
      description: Where are you running this?
      placeholder: "Node 22 / Deno 2.x / Netlify Edge Functions / Cloudflare Workers"
    validations:
      required: false

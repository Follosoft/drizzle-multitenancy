name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

        Before submitting, consider whether this feature would benefit other developers using the package. Check existing issues and discussions to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Describe the problem this feature would solve. Why do you need it?
    validations:
      required: true

  - type: textarea
    id: proposed-api
    attributes:
      label: Proposed API
      description: If you have an idea for the API surface, share it here. Code snippets welcome.
      render: typescript
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the package does this relate to?
      options:
        - New database provider
        - New tenant finder
        - New switch task
        - Core / context
        - Middleware
        - Collection utilities
        - Job serialization
        - Schema
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Willing to contribute?
      options:
        - label: I would be willing to submit a PR for this feature
